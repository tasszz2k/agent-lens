name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release-post-merge.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release-post-merge.outputs.tag_name }}
      version: ${{ steps.release.outputs.version || steps.release-post-merge.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge release PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --repo "${{ github.repository }}" --label "autorelease: pending" --json number -q '.[0].number')
          [ -n "$PR" ] && gh pr merge "$PR" --squash --repo "${{ github.repository }}"

      - uses: googleapis/release-please-action@v4
        id: release-post-merge
        if: steps.release.outputs.prs_created == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  homebrew:
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm registry propagation
        run: sleep 30

      - name: Download tarball and calculate SHA256
        id: sha256
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          URL="https://registry.npmjs.org/@tasszz2k/agentlens/-/agentlens-${VERSION}.tgz"
          curl -sSL -o agentlens.tgz "$URL"
          SHA256=$(shasum -a 256 agentlens.tgz | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          VERSION="${{ needs.release-please.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/tasszz2k/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Formula

          cat > Formula/agentlens.rb << 'FORMULA'
          class Agentlens < Formula
            desc "CLI tool to scan agent config and track usage costs across AI coding tools"
            homepage "https://github.com/tasszz2k/agent-lens"
            url "https://registry.npmjs.org/@tasszz2k/agentlens/-/agentlens-VERSION_PLACEHOLDER.tgz"
            sha256 "SHA256_PLACEHOLDER"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agentlens --version")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Formula/agentlens.rb
          sed -i "s/SHA256_PLACEHOLDER/$SHA256/g" Formula/agentlens.rb

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/agentlens.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update agentlens to v$VERSION"
          git push

          echo "Homebrew tap updated successfully!"
