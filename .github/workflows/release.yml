name: Release to npm and Homebrew

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Wait for npm registry propagation
        run: sleep 30

      - name: Download tarball and calculate SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://registry.npmjs.org/@tasszz2k/agentlens/-/agentlens-${VERSION}.tgz"
          curl -sSL -o agentlens.tgz "$URL"
          SHA256=$(shasum -a 256 agentlens.tgz | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/tasszz2k/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Formula

          cat > Formula/agentlens.rb << 'FORMULA'
          class Agentlens < Formula
            desc "CLI tool to scan agent config and track usage costs across AI coding tools"
            homepage "https://github.com/tasszz2k/agent-lens"
            url "https://registry.npmjs.org/@tasszz2k/agentlens/-/agentlens-VERSION_PLACEHOLDER.tgz"
            sha256 "SHA256_PLACEHOLDER"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agentlens --version")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" Formula/agentlens.rb
          sed -i "s/SHA256_PLACEHOLDER/$SHA256/g" Formula/agentlens.rb

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/agentlens.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update agentlens to v$VERSION"
          git push

          echo "Homebrew tap updated successfully!"
